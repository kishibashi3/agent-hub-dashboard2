# Docker image を GitHub Container Registry (ghcr.io) に publish
#
# 起動条件:
# - main branch への push → ghcr.io/kishibashi3/agent-hub-dashboard2:latest を更新
# - `v*.*.*` 形式の tag push → semver tag (:v0.1.0) + :latest を付与
# - PR (Dockerfile / src 変更を含む) → build のみ、push しない
#
# 認証:
# - GITHUB_TOKEN (GitHub Actions が自動付与) で ghcr.io login
# - repo Settings → Actions → General → Workflow permissions:
#   "Read and write permissions" が必要 (operator が初回設定)
# - ghcr.io パッケージの visibility は package 設定画面で operator が public 化

name: Docker Publish (ghcr.io)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    # PR では build verify のみ (push しない)
    # Dockerfile / src 変更で build break を merge 前に catch
    paths:
      - "Dockerfile"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/docker-publish.yml"

# 同一 ref で並列実行を 1 つに制限 (連続 push 時の race 回避)
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # ARM64 (Pi5) イメージを amd64 runner でクロスビルドするため QEMU が必要
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        # PR (pull_request event) では login も push もしない
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-hub-dashboard2
          tags: |
            # main push → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # tag push v1.2.3 → :v1.2.3
            type=ref,event=tag
            # main push → :main-<sha7> (rollback 用)
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # linux/amd64 (CI) + linux/arm64 (Pi5) の multi-arch manifest
          platforms: linux/amd64,linux/arm64
          # PR 時は push=false で build verify のみ
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          # BuildKit layer cache で再ビルドを高速化
          cache-from: type=gha
          cache-to: type=gha,mode=max
